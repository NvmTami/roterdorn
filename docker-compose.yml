services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: roterdorn
      MYSQL_DATABASE: roterdorn
      MYSQL_USER: roterdorn
      MYSQL_PASSWORD: roterdorn
    volumes:
      - ./database/dorn_db.sql:/docker-entrypoint-initdb.d/01-dump.sql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql
      - ./database/migrate.sql:/docker-entrypoint-initdb.d/03-migrate.sql
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"

volumes:
  db_data:
