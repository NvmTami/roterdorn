services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: roterdorn
      MYSQL_DATABASE: roterdorn
    volumes:
      - ./database/schema_new.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proterdorn"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: roterdorn
      DB_NAME: roterdorn
      FLASK_DEBUG: "true"
      CORS_ORIGINS: "http://localhost:4200"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  db_data:
